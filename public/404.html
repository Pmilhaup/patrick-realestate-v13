<style>
  body { margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center;
         background: var(--navy-0, #050E26); color: var(--ink-2, #D4DDE8);
         font-family: var(--font-sans, Inter, sans-serif); text-align:center; padding: 24px; }
  .wrap { max-width: 520px; }
  .code { font-family: var(--font-mono, monospace); font-size: 12px; letter-spacing: .25em;
          text-transform: uppercase; color: var(--gold-mid, #D4A760); }
  h1 { font-family: var(--font-serif, 'Cormorant Garamond', serif); font-weight: 300;
       font-size: clamp(34px, 6vw, 54px); color: #fff; margin: 18px 0 10px; line-height: 1.1; }
  h1 em { font-style: italic; color: var(--gold-lit, #F0D68A); }
  p { font-size: 15px; line-height: 1.65; color: var(--ink-3, #8896AD); margin: 0 0 30px; }
  .links { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; }
  .links a { font-family: var(--font-mono, monospace); font-size: 11px; letter-spacing:.14em;
             text-transform: uppercase; text-decoration: none; color: var(--gold-mid, #D4A760);
             border: 1px solid rgba(197,165,114,.35); border-radius: 4px; padding: 12px 20px;
             transition: border-color .2s ease, background .2s ease; }
  .links a:hover, .links a:focus-visible { border-color: var(--gold-mid, #D4A760); background: rgba(197,165,114,.07); }
  .rule { width: 56px; height: 1px; background: var(--gold-mid, #D4A760); margin: 0 auto 26px; }
</style>

  <main class="wrap">
    <div class="code">404 &middot; Not Found</div>
    <h1>This page doesn't exist.<br><em>The market data does.</em></h1>
    <div class="rule"></div>
    <p>The address you followed may have moved. Everything current is one step away.</p>
    <nav class="links" aria-label="Recovery">
      <a href="/">Home</a>
